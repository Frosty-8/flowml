{% extends "base.html" %}

{% block content %}
<div class="bg-white p-6 rounded-xl shadow-md">
    <h2 class="text-2xl font-semibold mb-4">Visualization</h2>

    <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
async function loadChart() {
    const path = localStorage.getItem("file_path");

    const dataset_id = localStorage.getItem("dataset_id");

    const res = await fetch(`/visualize/summary?dataset_id=${dataset_id}`);
    const data = await res.json();

    const labels = Object.keys(data);
    const values = Object.values(data).map(v => v.mean || 0);

    new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Mean Values",
                data: values
            }]
        }
    });
}

loadChart();
</script>
{% endblock %}
