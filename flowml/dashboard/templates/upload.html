{% extends "base.html" %}

{% block content %}

<div class="bg-white p-6 rounded-xl shadow-md">

    <h2 class="text-2xl font-semibold mb-6">📂 Data Source Upload</h2>

    <div id="fileSection">
        <label class="block mb-2 font-medium">Upload CSV</label>
        <input type="file" id="fileInput"
            class="border p-2 rounded w-full mb-4">
    </div>

    <div class="flex gap-4">
        <button onclick="uploadFile()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
            Upload
        </button>

        <button onclick="previewData()"
            class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
            Preview
        </button>
    </div>

    <p id="result" class="mt-4 text-green-600 font-medium"></p>

</div>

<script>
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/upload/", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    console.log("UPLOAD RESPONSE:", data);

    if (!data.dataset_id) {
        alert("Upload failed");
        return;
    }

    localStorage.setItem("dataset_id", data.dataset_id);

    document.getElementById("result").innerText =
        "Upload successful!";

    // 🔥 Redirect immediately
    window.location.href = `/ui/preview?dataset_id=${data.dataset_id}`;
}


function previewData() {
    const dataset_id = localStorage.getItem("dataset_id");

    if (!dataset_id) {
        alert("Upload a file first");
        return;
    }

    window.location.href = `/ui/preview?dataset_id=${dataset_id}`;
}
</script>

{% endblock %}
