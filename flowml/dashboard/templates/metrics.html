{% extends "base.html" %}

{% block content %}

<h2 class="text-2xl font-semibold mb-6">📊 System Metrics</h2>

<!-- KPI Cards -->
<div class="grid grid-cols-3 gap-6 mb-8">

    <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-gray-500">Total Requests</p>
        <h3 id="total_requests" class="text-2xl font-bold">0</h3>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-gray-500">Errors</p>
        <h3 id="errors" class="text-2xl font-bold text-red-500">0</h3>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-gray-500">Avg Latency</p>
        <h3 id="latency" class="text-2xl font-bold text-blue-500">0</h3>
    </div>

</div>

<!-- Data Metrics -->
<div class="bg-white p-6 rounded-xl shadow mb-6">
    <h3 class="text-xl font-semibold mb-4">📂 Data Operations</h3>
    <div id="data_metrics"></div>
</div>

<!-- Cleaning Metrics -->
<div class="bg-white p-6 rounded-xl shadow">
    <h3 class="text-xl font-semibold mb-4">🧹 Cleaning Operations</h3>
    <div id="cleaning_metrics"></div>
</div>

<script>
const socket = new WebSocket("ws://127.0.0.1:8000/ws/metrics");

socket.onopen = () => {
    console.log("Connected to WebSocket");
};

socket.onmessage = (event) => {
    const data = JSON.parse(event.data);

    // KPI
    document.getElementById("total_requests").innerText =
        data.requests.total_requests;

    document.getElementById("errors").innerText =
        data.requests.errors;

    document.getElementById("latency").innerText =
        data.requests.avg_latency;

    // Data metrics
    let dataHTML = "<table class='w-full border'>";
    dataHTML += "<tr class='bg-gray-100'><th>Rows</th><th>Cols</th><th>Missing</th></tr>";

    data.data.forEach(d => {
        dataHTML += `<tr>
            <td>${d.rows}</td>
            <td>${d.columns}</td>
            <td>${d.missing}</td>
        </tr>`;
    });

    dataHTML += "</table>";
    document.getElementById("data_metrics").innerHTML = dataHTML;

    // Cleaning metrics
    let cleanHTML = "<table class='w-full border'>";
    cleanHTML += "<tr class='bg-gray-100'><th>Operation</th><th>Before</th><th>After</th></tr>";

    data.cleaning.forEach(c => {
        cleanHTML += `<tr>
            <td>${c.operation}</td>
            <td>${c.rows_before || "-"}</td>
            <td>${c.rows_after || "-"}</td>
        </tr>`;
    });

    cleanHTML += "</table>";
    document.getElementById("cleaning_metrics").innerHTML = cleanHTML;
};
</script>

{% endblock %}
