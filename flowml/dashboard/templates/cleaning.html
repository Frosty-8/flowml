{% extends "base.html" %}

{% block content %}
<div class="bg-white p-6 rounded-xl shadow-md">
    <h2 class="text-2xl font-semibold mb-4">Data Cleaning</h2>

    <div class="flex gap-4">
        <button onclick="dropNulls()"
            class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">
            Drop Nulls
        </button>

        <button onclick="fillNulls()"
            class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded">
            Fill Nulls
        </button>
    </div>

    <pre id="result" class="mt-4 bg-gray-100 p-4 rounded text-sm"></pre>
</div>

<script>

function getDatasetId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("dataset_id") || localStorage.getItem("dataset_id");
}

async function dropNulls() {
    const dataset_id = getDatasetId();

    if (!dataset_id) {
        alert("No dataset found");
        return;
    }

    const res = await fetch(`/clean/drop_nulls?dataset_id=${dataset_id}`, {
        method: "POST"
    });

    const data = await res.json();

    console.log(data);

    document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
}

async function fillNulls() {
    const dataset_id = getDatasetId();

    if (!dataset_id) {
        alert("No dataset found");
        return;
    }

    const res = await fetch(`/clean/fill_nulls?dataset_id=${dataset_id}&value=0`, {
        method: "POST"
    });

    const data = await res.json();

    console.log(data);

    document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
}

</script>
{% endblock %}
