name: Publish Package to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # ---------------- CHECKOUT ---------------- #
      - name: Checkout Repo
        uses: actions/checkout@v4

      # ---------------- PYTHON ---------------- #
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------- RUST ---------------- #
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ---------------- MATURIN ---------------- #
      - name: Install maturin
        run: pip install maturin

      # ---------------- BUILD ---------------- #
      - name: Build wheel
        run: maturin build --release -i python3.11 --manifest-path rust/Cargo.toml

      # ---------------- UPLOAD ARTIFACT ---------------- #
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/*.whl   # only upload .whl files, not entire folder

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-and-publish

    steps:
      # ---------------- DOWNLOAD BUILT WHEELS ---------------- #
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist

      # ---------------- FLATTEN WHEELS ---------------- #
      - name: Flatten wheels
        run: |
          mkdir final_dist
          find dist -name "*.whl" -exec cp {} final_dist/ \;

      # ---------------- INSTALL TWINE ---------------- #
      - name: Install twine
        run: pip install twine

      # ---------------- PUBLISH ---------------- #
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload final_dist/*.whl